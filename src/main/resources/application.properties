# Server port
server.port=8080

# Application name
spring.application.name=query-builder-api

# PostgreSQL datasource (using environment variables)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/query_builder_db}
spring.datasource.username=${DB_USERNAME:your_username}
spring.datasource.password=${DB_PASSWORD:your_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.com.example=INFO
logging.level.org.springframework.web=DEBUG

# Security Configuration
app.security.username=${API_USERNAME:admin}
app.security.password=${API_PASSWORD:change_this_password_in_production}

